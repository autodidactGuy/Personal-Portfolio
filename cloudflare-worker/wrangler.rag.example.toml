name = "personal-portfolio-rag"
main = "src/index.ts"
compatibility_date = "2026-04-21"
workers_dev = true

[observability]
enabled = true

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTOR_INDEX"
index_name = "portfolio-rag-index"

[[kv_namespaces]]
binding = "RAG_KV"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_PREVIEW_NAMESPACE_ID"

[vars]
RAG_EMBED_MODEL = "@cf/baai/bge-small-en-v1.5"
RAG_CHAT_MODEL = "@cf/meta/llama-3.1-8b-instruct"
RAG_TOP_K = "10"
RAG_SIMILARITY_THRESHOLD = "0.50"
RAG_MAX_CONTEXT_CHUNKS = "4"
RAG_MAX_OUTPUT_TOKENS = "300"
RAG_CHUNK_TARGET_CHARS = "900"
RAG_CHUNK_MAX_CHARS = "1200"
RAG_CHUNK_OVERLAP_CHARS = "120"
RAG_ALLOWED_ORIGINS = "*"

# Local ingestion script env vars:
#   CLOUDFLARE_ACCOUNT_ID=
#   CLOUDFLARE_API_TOKEN=
#   CLOUDFLARE_VECTORIZE_INDEX=portfolio-rag-index
#   CLOUDFLARE_KV_NAMESPACE_ID=YOUR_KV_NAMESPACE_ID
