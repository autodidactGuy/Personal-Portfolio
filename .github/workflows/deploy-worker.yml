name: Deploy Cloudflare Worker

on:
  # push:
    # branches:
    #   - main
    # paths:
    #   - "cloudflare-worker/**"
    #   - "content/**"
    #   - "public/api/resume.json"
    #   - "scripts/generate-resume-json.mjs"
    #   - "package.json"
    #   - "yarn.lock"
    #   - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "22"

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            cloudflare-worker/yarn.lock

      - name: Install root dependencies
        run: yarn install --frozen-lockfile

      - name: Install worker dependencies
        working-directory: cloudflare-worker
        run: yarn install --frozen-lockfile

      - name: Run worker tests
        working-directory: cloudflare-worker
        run: yarn test

      - name: Prepare Wrangler config
        working-directory: cloudflare-worker
        env:
          CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
          CLOUDFLARE_R2_PREVIEW_BUCKET: ${{ secrets.CLOUDFLARE_R2_PREVIEW_BUCKET }}
        run: |
          cp wrangler.jsonc wrangler.ci.jsonc
          sed -i "s/YOUR_R2_BUCKET_NAME/${CLOUDFLARE_R2_BUCKET}/g" wrangler.ci.jsonc
          if [ -n "${CLOUDFLARE_R2_PREVIEW_BUCKET}" ]; then
            sed -i "s/YOUR_R2_PREVIEW_BUCKET_NAME/${CLOUDFLARE_R2_PREVIEW_BUCKET}/g" wrangler.ci.jsonc
          else
            sed -i "s/YOUR_R2_PREVIEW_BUCKET_NAME/${CLOUDFLARE_R2_BUCKET}/g" wrangler.ci.jsonc
          fi

      - name: Build and ingest RAG dataset
        working-directory: cloudflare-worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_VECTORIZE_INDEX: ${{ secrets.CLOUDFLARE_VECTORIZE_INDEX }}
          CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        run: yarn rag:build

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "cloudflare-worker"
          command: deploy --config wrangler.ci.jsonc
