name: Deploy PR preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "content/**"
      - "public/**"
      - "src/**"
      - "scripts/**"
      - "next.config.mjs"
      - "package.json"
      - "yarn.lock"
      - ".github/workflows/deploy.yml"
      - ".github/workflows/preview.yml"
      - ".github/workflows/preview-cleanup.yml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: "pages-preview-${{ github.event.pull_request.number }}"
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PUBLISH_BRANCH: "gh-pages"
  PREVIEW_SUBDIR: "previews/pr-${{ github.event.pull_request.number }}"
  NEXT_PUBLIC_REPOSITORY_NAME: ${{ github.event.repository.name }}
  NEXT_PUBLIC_BASE_PATH: "/previews/pr-${{ github.event.pull_request.number }}"

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build PR preview export
        run: yarn build

      - name: Publish preview to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SOURCE_DIR: out
          TARGET_SUBDIR: ${{ env.PREVIEW_SUBDIR }}
          COMMIT_MESSAGE: "Deploy PR #${{ github.event.pull_request.number }} preview from ${{ github.sha }}"
        run: bash scripts/publish-pages-branch.sh

      - name: Resolve preview URL
        id: preview_url
        run: |
          if [ -f public/CNAME ]; then
            echo "url=https://$(cat public/CNAME)/${PREVIEW_SUBDIR}/" >> "$GITHUB_OUTPUT"
          else
            repo_name="${GITHUB_REPOSITORY#*/}"
            echo "url=https://${GITHUB_REPOSITORY_OWNER}.github.io/${repo_name}/${PREVIEW_SUBDIR}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment preview URL on pull request
        uses: actions/github-script@v8
        env:
          PREVIEW_URL: ${{ steps.preview_url.outputs.url }}
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = "<!-- pages-preview-comment -->";
            const body = [
              marker,
              `Preview updated for \`${context.payload.pull_request.head.sha.slice(0, 7)}\`.`,
              "",
              `URL: ${process.env.PREVIEW_URL}`,
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
