name: Remove PR preview

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write
  pull-requests: write

env:
  PUBLISH_BRANCH: "gh-pages"
  PREVIEW_SUBDIR: "previews/pr-${{ github.event.pull_request.number }}"

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove preview folder from gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TARGET_SUBDIR: ${{ env.PREVIEW_SUBDIR }}
          COMMIT_MESSAGE: "Remove PR #${{ github.event.pull_request.number }} preview"
        run: bash scripts/remove-pages-subdir.sh

      - name: Mark preview comment as removed
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = "<!-- pages-preview-comment -->";
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: [
                  marker,
                  `Preview removed because PR #${context.issue.number} was closed.`,
                ].join("\n"),
              });
            }
