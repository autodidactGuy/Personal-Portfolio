name: Deploy Next.js portfolio

on:
  push:
    branches:
      - main
    paths:
      - "content/**"
      - "public/**"
      - "src/**"
      - "scripts/**"
      - "next.config.mjs"
      - "package.json"
      - "yarn.lock"
      - ".github/workflows/deploy.yml"
      - ".github/workflows/preview.yml"
      - ".github/workflows/preview-cleanup.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages-production"
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  NEXT_PUBLIC_REPOSITORY_NAME: ${{ github.event.repository.name }}
  NEXT_PUBLIC_BASE_PATH: ""
  PUBLISH_BRANCH: "gh-pages"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build static export
        run: yarn build

      - name: Publish production site to gh-pages root
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SOURCE_DIR: out
          PRESERVE_DIR: previews
          COMMIT_MESSAGE: "Deploy production site from ${{ github.sha }}"
        run: bash scripts/publish-pages-branch.sh
