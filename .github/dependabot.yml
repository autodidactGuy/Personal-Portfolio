version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
    commit-message:
      prefix: "deps"
    groups:
      frontend-runtime:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@nextui-org/react"
          - "next-mdx-remote"
          - "next-themes"
          - "framer-motion"
          - "react-hook-form"
          - "@hookform/resolvers"
          - "react-calendly"
          - "sonner"
      tooling-and-build:
        patterns:
          - "typescript"
          - "eslint"
          - "eslint-config-next"
          - "@types/*"
          - "tailwindcss"
          - "autoprefixer"
          - "gray-matter"
          - "zod"
          - "sharp"
    ignore:
      - dependency-name: "next"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "eslint-config-next"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "glob"
      - dependency-name: "minimatch"

  - package-ecosystem: "npm"
    directory: "/cloudflare-worker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
    open-pull-requests-limit: 2
    versioning-strategy: increase-if-necessary
    commit-message:
      prefix: "deps(worker)"
    groups:
      worker-tooling:
        patterns:
          - "wrangler"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "ci"
