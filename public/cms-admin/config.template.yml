local_backend: false
site_url: __SITE_URL__
display_url: __DISPLAY_URL__
logo_url: /favicon.png
publish_mode: simple

backend:
  name: github
  repo: autodidactGuy/Personal-Portfolio
  branch: main
  base_url: __BACKEND_BASE_URL__
  auth_endpoint: /auth

media_folder: "/public/images"
public_folder: "/images"

collections:
  - name: "homepage"
    label: "Homepage"
    media_folder: "/public/images/home"
    public_folder: "/images/home"
    files:
      - name: "hero"
        label: "Hero"
        file: "content/home/hero.json"
        format: "json"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Headline", name: "headline", widget: "string" }
          - { label: "Highlighted Text", name: "highlightedText", widget: "string" }
          - { label: "Supporting Text", name: "supportingText", widget: "text" }
          - { label: "Image", name: "image", widget: "image" }
          - label: "Primary CTA"
            name: "primaryCta"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Href", name: "href", widget: "string" }
              - { label: "External", name: "external", widget: "boolean", default: true }
          - label: "Secondary CTA"
            name: "secondaryCta"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Href", name: "href", widget: "string" }
              - { label: "External", name: "external", widget: "boolean", default: false }
      - name: "stats"
        label: "Stats"
        file: "content/home/stats.json"
        format: "json"
        fields:
          - { label: "Section Title", name: "title", widget: "string" }
          - { label: "Badge Label", name: "badgeLabel", widget: "string" }
          - label: "Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Value", name: "value", widget: "string" }
      - name: "featured-focus"
        label: "Featured Focus"
        file: "content/home/featured-focus.json"
        format: "json"
        fields:
          - { label: "Section Label", name: "sectionLabel", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Summary", name: "summary", widget: "text" }
          - { label: "Pillars", name: "pillars", widget: "list" }
          - label: "CTA"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Href", name: "href", widget: "string" }
  - name: "recommendations"
    label: "Recommendations"
    media_folder: "/public/images/recommendations"
    public_folder: "/images/recommendations"
    files:
      - name: "recommendation-list"
        label: "Recommendation List"
        file: "content/recommendations/index.json"
        format: "json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - label: "Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Quote", name: "quote", widget: "text" }
              - { label: "Featured", name: "featured", widget: "boolean", default: false }
  - name: "about"
    label: "About"
    media_folder: "/public/images/about"
    public_folder: "/images/about"
    files:
      - name: "profile"
        label: "Profile"
        file: "content/about/profile.json"
        format: "json"
        fields:
          - { label: "Page Label", name: "pageLabel", widget: "string" }
          - { label: "Page Title", name: "pageTitle", widget: "string" }
          - { label: "Page Description", name: "pageDescription", widget: "text" }
          - { label: "About Section Title", name: "aboutSectionTitle", widget: "string" }
          - { label: "About Section Subtitle", name: "aboutSectionSubtitle", widget: "text" }
          - { label: "Summary Label", name: "summaryLabel", widget: "string" }
          - { label: "Headline", name: "headline", widget: "string" }
          - { label: "Summary", name: "summary", widget: "text" }
          - { label: "Body", name: "body", widget: "list" }
          - { label: "Photo", name: "photo", widget: "image" }
          - { label: "Experience Title", name: "experienceTitle", widget: "string" }
          - { label: "Experience Subtitle", name: "experienceSubtitle", widget: "text" }
          - { label: "Education Title", name: "educationTitle", widget: "string" }
          - { label: "Education Subtitle", name: "educationSubtitle", widget: "text" }
      - name: "experience"
        label: "Experience"
        file: "content/about/experience.json"
        format: "json"
        fields:
          - label: "Experience Items"
            name: "items"
            widget: "list"
            summary: "{{fields.title}} - {{fields.company}}"
            collapsed: false
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Company", name: "company", widget: "string" }
              - { label: "Company Comments", name: "companyComments", widget: "string", required: false }
              - { label: "Location", name: "location", widget: "string" }
              - { label: "From", name: "from", widget: "string" }
              - { label: "To", name: "to", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
      - name: "education"
        label: "Education"
        file: "content/about/education.json"
        format: "json"
        fields:
          - label: "Education Items"
            name: "items"
            widget: "list"
            summary: "{{fields.degree}}"
            collapsed: false
            fields:
              - { label: "Degree", name: "degree", widget: "string" }
              - { label: "Institute", name: "institute", widget: "string" }
              - { label: "Location", name: "location", widget: "string" }
              - { label: "From", name: "from", widget: "string" }
              - { label: "To", name: "to", widget: "string" }
              - { label: "Result", name: "result", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
  - name: "settings"
    label: "Settings"
    media_folder: "/public/images/settings"
    public_folder: "/images/settings"
    files:
      - name: "site"
        label: "Site Settings"
        file: "content/settings/site.json"
        format: "json"
        fields:
          - { label: "Site URL", name: "siteUrl", widget: "string" }
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Initials", name: "initials", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Slogan", name: "slogan", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Avatar", name: "avatar", widget: "image" }
          - label: "Coming Soon Mode"
            name: "comingSoonMode"
            widget: "object"
            fields:
              - { label: "Enabled", name: "enabled", widget: "boolean", default: false }
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - label: "Navigation"
            name: "navigation"
            widget: "object"
            fields:
              - label: "Primary"
                name: "primary"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Href", name: "href", widget: "string" }
          - label: "Links"
            name: "links"
            widget: "object"
            fields:
              - { label: "GitHub", name: "github", widget: "string" }
              - { label: "Twitter", name: "twitter", widget: "string" }
              - { label: "LinkedIn", name: "linkedin", widget: "string" }
              - { label: "Resume", name: "resume", widget: "string" }
              - { label: "Calendly", name: "calendly", widget: "string" }
      - name: "contact"
        label: "Contact Settings"
        file: "content/settings/contact.json"
        format: "json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Form Heading", name: "formHeading", widget: "string" }
          - { label: "Schedule Heading", name: "scheduleHeading", widget: "string" }
  - name: "posts"
    label: "Posts"
    folder: "content/posts"
    media_folder: "/public/images/posts"
    public_folder: "/images/posts"
    create: true
    slug: "{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    summary: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - label: "Content Type"
        name: "contentType"
        widget: "select"
        options:
          - { label: "Article", value: "article" }
          - { label: "Case Study", value: "case-study" }
          - { label: "News", value: "news" }
          - { label: "Project", value: "project" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Cover Image", name: "coverImage", widget: "image", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Published", name: "published", widget: "boolean", default: true }
